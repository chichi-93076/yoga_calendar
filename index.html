<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="apple-touch-icon" href="./yoga_icon_20260209.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./yoga_icon_20260209.png">
    <title>教職員體適能瑜珈社行事曆 - 洛伊德可愛風</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        /* 🖤 洛伊德（黃昏）配色變數 */
        :root {
            --loid-gold: #D7C68A;           /* 金髮 - 強調色、Google按鈕背景 */
            --loid-gold-shadow: #B8A86F;    /* 深金陰影 - 按鈕邊框陰影 */
            --loid-suit: #44514D;           /* 西裝深綠灰 - 主要文字、外框 */
            --loid-shirt: #f1e4b5;          /* 襯衫白 - 行事曆卡片背景 */
            --loid-tie: #4C8C95;            /* 藍綠領帶 - 表頭背景、主要按鈕 */
            --loid-tie-light:#E6F2F4;      /* 藍綠領帶極淺色 - 課程區塊背景、網頁大背景 */
            --loid-body:#8FA391;   /*  網頁大背景 */
        }

        body { 
            /* 結合圓潤英文字體與思源黑體 */
            font-family: "Varela Round", "Noto Sans TC", sans-serif;
            background-color: var(--loid-body); /* 網頁背景使用極淺藍綠，柔和舒適 */
/*  修改開始：背景直條紋設定
            background-color: var(--loid-body); 
            background-image: linear-gradient(
                90deg, 
                transparent 50%, 
                rgba(255, 255, 255, 0.2) 50%
            );
            background-size: 50px 100%; 
    修改結束  */            
            display: flex; 
            justify-content: center; 
            padding: 30px 20px; 
            margin: 0; 
            color: var(--loid-suit);
        }

        .calendar-container { 
            width: 900px; 
            background-color: var(--loid-shirt); /* 襯衫白背景 */
            /* 可愛風核心：超大圓角與柔和陰影 */
            border-radius: 24px; 
            border: 3px solid var(--loid-suit);
            padding: 25px; 
            box-shadow: 0 10px 25px rgba(68, 81, 77, 0.15); /* 柔和的西裝色暈影 */
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
            gap: 15px; 
        }

        .month-year { 
            font-size: 28px; 
            font-weight: 900; 
            color: var(--loid-suit);
            /* 加入一點可愛的文字描邊感 */
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px rgba(0,0,0,0.1);
        }

        .nav-btn { 
            padding: 10px 24px; 
            font-size: 16px; 
            font-weight: bold;
            font-family: inherit;
            /* 使用藍綠領帶色作為主按鈕 */
            background-color: var(--loid-tie); 
            color: #fff; 
            border: none;
            border-radius: 50px; /* 膠囊狀按鈕 */
            cursor: pointer; 
            /* Q彈立體感陰影 */
            box-shadow: 0 4px 0 #3A6B72; /* 比領帶色深一點 */
            transition: all 0.1s ease-in-out;
        }

        .nav-btn:hover { 
            background-color: #5DA3AD; /* 稍微變亮 */
            transform: translateY(2px); /* 按壓效果 */
            box-shadow: 0 2px 0 #3A6B72;
        }
        
        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            border-radius: 16px; /* 整個表格大圓角 */
            overflow: hidden; 
            border: 2px solid var(--loid-suit);
            background-color: #fff;
        }

        .day-header { 
            background-color: var(--loid-tie); /* 藍綠領帶色表頭 */
            text-align: center; 
            padding: 14px 0; 
            font-weight: bold; 
            color: #ffffff; 
            font-size: 16px;
            letter-spacing: 1px;
        }

        .day-cell { 
            padding: 10px; 
            min-height: 100px; 
            background-color: #ffffff; 
            border-right: 1px dashed rgba(68, 81, 77, 0.2); /* 使用虛線分隔，更輕盈 */
            border-bottom: 1px dashed rgba(68, 81, 77, 0.2);
        }

        .day-cell:nth-child(7n) { border-right: none; }

        .day-number { 
            font-size: 16px; 
            font-weight: 800; 
            color: var(--loid-suit); 
            /* 改為可愛的圓形數字標籤 */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background-color: var(--loid-tie-light);
            border-radius: 50%;
            margin-bottom: 6px; 
        }
        
        /* 課程樣式 - 可愛貼紙風格 */
        .event { 
            /* 使用極淺藍綠色底 */
            background-color: var(--loid-tie-light);
            /* 使用藍綠領帶色虛線邊框，像縫線一樣 */
            border: 2px dashed var(--loid-tie);
            padding: 8px 10px; 
            margin-top: 6px; 
            /* 圓潤的貼紙形狀 */
            border-radius: 12px; 
            font-size: 13px; 
            font-weight: 700;
            color: var(--loid-suit); 
            line-height: 1.5; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05); /* 輕微浮起感 */
            transition: transform 0.2s;
        }
        
        .event:hover {
            transform: scale(1.02) rotate(-1deg); /* 滑鼠移上去稍微放大歪斜，增加俏皮感 */
        }

        .event-red {
            color: red;
        }

        /* Google 按鈕 - 使用亮眼的金髮色 */
        .add-calendar { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            margin-left: 5px;
            width: 22px; 
            height: 22px; 
            padding: 0; 
            font-size: 14px;
            font-weight: 900;
            color: var(--loid-suit); /* 文字用深色對比 */
            background-color: var(--loid-gold); /* 金髮色背景 */
            border: 2px solid var(--loid-gold-shadow); /* 深金邊框 */
            border-radius: 50%; /* 圓形 */
            text-decoration: none; 
            cursor: pointer; 
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            transition: all 0.2s;
            vertical-align: middle;
        }
        .add-calendar:hover { 
            background-color: #E6D599; 
            transform: rotate(90deg); /* hover時旋轉，增加趣味性 */
        }

        /* 手機版 RWD - 保持卡片可愛風格 */
        @media (max-width: 768px) {
            .calendar-container { padding: 15px; border-radius: 16px;}
            .month-year { font-size: 22px; text-align: center; }
            .header { justify-content: center; }
            .nav-btn { padding: 8px 16px; font-size: 14px; }
            
            .calendar-grid { grid-template-columns: 1fr; display: flex; flex-direction: column; gap: 15px; border: none; background: transparent; }
            .day-header { display: none; }
            .day-cell:not(.has-event) { display: none; }
            
            /* 手機版單日卡片 */
            .day-cell { 
                display: block; 
                border: 3px solid var(--loid-suit); 
                border-radius: 16px; 
                padding: 15px; 
                box-shadow: 4px 4px 0 rgba(68, 81, 77, 0.1); 
                background-color: #fff;
            }
            .day-cell::before { 
                content: attr(data-day); 
                display: block; 
                font-size: 16px; 
                font-weight: bold; 
                color: var(--loid-tie); 
                margin-bottom: 5px; 
            }
            .day-number { 
                font-size: 20px; 
                width: auto; height: auto; background: none; border-radius: 0;
                margin-bottom: 10px;
                display: block;
            }
            .event { font-size: 15px; padding: 12px; border-width: 3px; }
            .add-calendar { width: 28px; height: 28px; font-size: 16px; }
        }
    </style>
</head>

            { date: "2026-06-22", start: "17:15", end: "18:05", name: "教職員體適能瑜珈社", location: "育美館韻律教室" },
            { date: "2026-06-25", start: "17:15", end: "18:05", name: "教職員體適能瑜珈社", location: "育美館韻律教室" }
        ];

        const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const gridContainer = document.getElementById('calendar-grid');
        const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
        
        const today = new Date();
        const year = today.getFullYear();      // 2026
        const month = today.getMonth();         // 2 (0-11，所以 3 月是 2)
        let currentMonth = new Date(year, month); // 預設 2026 年 3 月
        console.log(currentMonth);
        function renderCalendar() {
            gridContainer.innerHTML = '';

            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            //console.log(year, month);
            // 更新標題
            document.getElementById('calendar-title').textContent = `教職員體適能瑜珈社 ${year} 年 ${monthNames[month]}份行事曆`;

            // 產生標題列
            weekDays.forEach(day => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.textContent = day;
                gridContainer.appendChild(header);
            });

            // 計算起始日期
            const firstDay = new Date(year, month, 1);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            let currentDate = new Date(startDate);
            const totalDays = 35; // 顯示 5 週

            for (let i = 0; i < totalDays; i++) {
                const dateYear = currentDate.getFullYear();
                const dateMonth = String(currentDate.getMonth() + 1).padStart(2, '0');
                const dateDay = String(currentDate.getDate()).padStart(2, '0');
                const dateStr = `${dateYear}-${dateMonth}-${dateDay}`;
                const dayOfWeek = weekDays[currentDate.getDay()];

                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.setAttribute('data-day', dayOfWeek);

                const numDiv = document.createElement('div');
                numDiv.className = 'day-number';
                numDiv.textContent = currentDate.getDate();
                cell.appendChild(numDiv);

                const event = courseData.find(c => c.date === dateStr);

                if (event) {
                    cell.classList.add('has-event');

                    // Google 按鈕移到這裡，讓它跟在日期後面
                    const gLink = document.createElement('a');
                    gLink.className = 'add-calendar';
                    gLink.target = '_blank';
                    gLink.textContent = '＋'; 
                    gLink.href = generateGoogleLink(event, event.location);
                    numDiv.appendChild(gLink); // 將按鈕加入到數字圓圈旁

                    const eventInfo = document.createElement('div');
                    eventInfo.className = 'event';
                    if (event.location !== "育美館韻律教室") {
                        eventInfo.classList.add('event-red');
                    }
                    // 這裡移除按鈕，只保留文字
                    eventInfo.innerHTML = `${event.start}–${event.end}<br>${event.location}`;
                    cell.appendChild(eventInfo);
                }

                gridContainer.appendChild(cell);
                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        function generateGoogleLink(event, location) {
            function toTC(dateStr, timeStr) {
                const dt = new Date(`${dateStr}T${timeStr}:00+08:00`); 
                return dt.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            }

            const startUTC = toTC(event.date, event.start);
            const endUTC = toTC(event.date, event.end);
            
            const baseUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE";
            const text = `&text=${encodeURIComponent(event.name)}`;
            const dates = `&dates=${startUTC}/${endUTC}`;
            const loc = `&location=${encodeURIComponent(location)}`;
            
            return baseUrl + text + dates + loc;
        }

        // 按鈕事件
        document.getElementById('prev-month').addEventListener('click', () => {
            currentMonth.setMonth(currentMonth.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('next-month').addEventListener('click', () => {
            currentMonth.setMonth(currentMonth.getMonth() + 1);
            renderCalendar();
        });

        // 初始化
        renderCalendar();
    </script>
